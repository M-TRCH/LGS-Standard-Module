; PlatformIO Project Configuration File
;
; LGS (Light Guiding Shelf) - Standard Module
;
; Two build environments share the same source tree. The target board is
; selected through the LGS_BOARD_* build flag, which drives include/hw_config.h.
;
;   pio run -e genericSTM32F103C8   ; current production board (R4.x)
;   pio run -e genericSTM32G030C8   ; next-gen board (custom board def in boards/)
;
; Optional feature flags:
;   -D LGS_ENABLE_DISPLAY=1         ; compile in the OLED display HAL
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = genericSTM32F103C8

[env]
framework = arduino
monitor_speed = 9600
lib_deps =
	arduino-libraries/ArduinoModbus@^1.0.9
	arduino-libraries/ArduinoRS485@^1.1.0
	adafruit/Adafruit NeoPixel@^1.15.1
	sensirion/Sensirion I2C STS4x@^0.1.0
	adafruit/Adafruit GFX Library@^1.12.3
	adafruit/Adafruit SSD1306@^2.5.15

; ---------------------------------------------------------------------------
; Current production board: STM32F103C8T6 (LGS R4.x)
; ---------------------------------------------------------------------------
[env:genericSTM32F103C8]
platform = ststm32
board = genericSTM32F103C8
board_build.f_cpu = 24000000L
build_flags =
	-D LGS_BOARD_STM32F103

; ---------------------------------------------------------------------------
; Next-gen board: STM32G030C8T6 (uses boards/genericSTM32G030C8.json)
; ---------------------------------------------------------------------------
[env:genericSTM32G030C8]
platform = ststm32
board = genericSTM32G030C8
build_flags =
	-D LGS_BOARD_STM32G030
